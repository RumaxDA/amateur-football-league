services:
  db:
    image: postgres:17
    container_name: afl-db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build: ./back
    container_name: afl-backend
    ports:
      - "8000:8000"
    volumes:
      - ./back:/app
    environment:
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://user:password@db:5432/afl_db
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build: ./front
    container_name: afl-frontend
    ports:
      - "4200:8080"
    depends_on:
      - backend

volumes:
  db_data:
